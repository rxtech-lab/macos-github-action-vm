name: Release rvmm CLI

on:
  push:
  release:
    types:
      - released
  workflow_dispatch:

jobs:
  build-macos:
    name: Build, Sign and Notarize macOS Binary
    runs-on: [self-hosted, macOS, ARM64]
    permissions:
      contents: write
    defaults:
      run:
        working-directory: cli
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v7
        with:
          go-version: '1.26.x'
          check-latest: true
          cache-dependency-path: cli/go.sum

      - name: Install dependencies
        run: go mod download

      - name: Run tests
        run: go test ./...

      - name: Import code signing certificates
        uses: apple-actions/import-codesign-certs@v7
        with:
          p12-file-base64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          p12-password: ${{ secrets.P12_PASSWORD }}

      - name: Build and sign the binary
        run: |
          if [[ "${GITHUB_EVENT_NAME}" == "release" ]]; then
            VERSION="${GITHUB_REF_NAME}"
          else
            VERSION="v0.0.0-${GITHUB_SHA:0:12}"
          fi
          make build VERSION="${VERSION}" COMMIT="${GITHUB_SHA:0:12}" TEAM_ID="${APPLE_TEAM_ID}"
          ./scripts/sign.sh
        env:
          SIGNING_CERTIFICATE_NAME: ${{ secrets.SIGNING_CERTIFICATE_NAME }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      - name: Verify Mach-O UUID
        run: otool -l bin/rvmm | grep -q 'cmd LC_UUID'

      - name: Import installer signing certificate
        uses: apple-actions/import-codesign-certs@v7
        with:
          p12-file-base64: ${{ secrets.INSTALLER_CERTIFICATE_BASE64 }}
          p12-password: ${{ secrets.P12_PASSWORD }}
          keychain: installer

      - name: Package and notarize
        if: github.event_name == 'release'
        run: |
          # Strip leading 'v' from semver tags (v1.2.3 -> 1.2.3) for pkg version
          PKG_VERSION="${GITHUB_REF_NAME#v}"
          export PKG_VERSION
          ./scripts/package-notarize.sh
        env:
          INSTALLER_SIGNING_CERTIFICATE_NAME: ${{ secrets.INSTALLER_SIGNING_CERTIFICATE_NAME }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_ID_PWD: ${{ secrets.APPLE_ID_PWD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      - name: Upload pkg to release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v3
        with:
          files: |
            cli/rvmm_macOS_arm64.pkg
            cli/rvmm_macOS_arm64.pkg.sha256
          token: ${{ secrets.GITHUB_TOKEN }}
